modules:
  jira:globalPage:
    - key: service-lifecycle-tracker
      resource: main
      resolver:
        function: resolver
      title: Service Lifecycle Tracker
  jira:adminPage:
    - key: service-lifecycle-admin
      resource: admin
      resolver:
        function: resolver
      title: Service Lifecycle Settings
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/hello-world/build
  - key: admin
    path: static/admin/build
permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:servicedesk-request
    - read:group:jira  # Required for checking user group membership (access control)
    - storage:app      # Required for storing app configuration (allowed groups, field mappings)
    - read:cmdb-object:jira     # Read Asset objects (Customer, Unit details)
    - read:cmdb-schema:jira
    - read:cmdb-attribute:jira     # Read Asset schemas (for attribute names)
    # Note: read:servicedesk-request is already included above and provides access to:
    # - /rest/servicedeskapi/assets/workspace (to get workspace ID)
    # The cmdb scopes above provide access to the Assets AQL API
  external: 
    fetch:
      backend:
        - address: api.atlassian.com
      client:
        - address: fonts.googleapis.com
        - address: fonts.gstatic.com
app:
  runtime:
    name: nodejs24.x
    memoryMB: 512
    architecture: arm64
  id: ari:cloud:ecosystem::app/4779b8c2-238b-4c6f-8b46-073e33ad45f5
